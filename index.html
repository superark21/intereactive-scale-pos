<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WebGPU Image Grid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #upload-screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      z-index: 10;
      transition: opacity 0.4s ease;
    }

    #upload-screen.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #upload-screen h1 {
      font-size: 1.4rem;
      font-weight: 400;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
    }

    #upload-label {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: 1px solid #333;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      color: #ccc;
      background: #111;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    #upload-label:hover {
      border-color: #666;
      color: #fff;
      background: #1a1a1a;
    }

    #file-input {
      display: none;
    }

    #error-msg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: #e06060;
      background: #0a0a0f;
      z-index: 20;
      text-align: center;
      padding: 40px;
      line-height: 1.7;
      display: none;
    }

    #canvas-container {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #gpu-canvas {
      display: block;
      /* size set by JS */
    }

    #grid-toggle {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      gap: 0;
      z-index: 5;
      border: 1px solid #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #grid-toggle.visible { display: flex; }
    .grid-btn {
      padding: 8px 20px;
      background: #111;
      color: #555;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      border: none;
      transition: background 0.2s, color 0.2s;
    }
    .grid-btn + .grid-btn { border-left: 1px solid #333; }
    .grid-btn.active { background: #1e1e1e; color: #ddd; }
    .grid-btn:hover:not(.active) { color: #999; }

    #gyro-btn {
      position: fixed;
      bottom: 68px;
      left: 50%;
      transform: translateX(-50%);
      display: none;
      padding: 8px 20px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #111;
      color: #888;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      z-index: 5;
      transition: color 0.2s, border-color 0.2s;
    }
    #gyro-btn.visible  { display: block; }
    #gyro-btn.enabled  { color: #7af; border-color: #7af; }
  </style>
</head>
<body>

  <div id="error-msg"></div>

  <div id="upload-screen">
    <h1>WebGPU Image Grid</h1>
    <label id="upload-label" for="file-input">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Choose an image
    </label>
    <input type="file" id="file-input" accept="image/*" />
    <p style="font-size:0.75rem;color:#444;margin-top:4px;">Move the mouse after upload</p>
  </div>

  <div id="canvas-container">
    <canvas id="gpu-canvas"></canvas>
  </div>

  <div id="grid-toggle">
    <button class="grid-btn active" data-mode="proportional">Proportional</button>
    <button class="grid-btn"        data-mode="square">Square</button>
  </div>
  <button id="gyro-btn">Enable Gyroscope</button>

<script>
(async () => {

  /* ------------------------------------------------------------------ */
  /*  WebGPU availability check                                          */
  /* ------------------------------------------------------------------ */
  const errorEl = document.getElementById('error-msg');

  function fatalError(msg) {
    errorEl.style.display = 'flex';
    errorEl.innerHTML = msg;
  }

  if (!navigator.gpu) {
    fatalError(
      'WebGPU is not supported in this browser.<br/>' +
      'Try Chrome 113+ or Edge 113+ on a supported platform.'
    );
    return;
  }

  const adapter = await navigator.gpu.requestAdapter();
  if (!adapter) {
    fatalError('No WebGPU adapter found. Your GPU may not be supported.');
    return;
  }

  const device = await adapter.requestDevice();

  /* ------------------------------------------------------------------ */
  /*  DOM refs                                                            */
  /* ------------------------------------------------------------------ */
  const canvas       = document.getElementById('gpu-canvas');
  const uploadScreen = document.getElementById('upload-screen');
  const fileInput    = document.getElementById('file-input');

  const ctx = canvas.getContext('webgpu');

  const preferredFormat = navigator.gpu.getPreferredCanvasFormat();

  function configureContext() {
    ctx.configure({ device, format: preferredFormat, alphaMode: 'opaque' });
  }
  configureContext();

  /* ------------------------------------------------------------------ */
  /*  State                                                               */
  /* ------------------------------------------------------------------ */
  let imageAspect      = 1;
  let running          = false;
  let needsReconfigure = false;
  let hoverActive      = 0.0;
  let gridMode         = 'proportional';
  let gridX            = 12;
  let gridY            = 12;
  let currentGpuTex    = null;

  // Physics state
  let quadOffsetBuffer = null;
  let quadCount        = 0;
  let physicsState     = null;  // Float32Array[quadCount*4]: ox,oy,vx,vy per quad
  let offsetData       = null;  // Float32Array[quadCount*2]: ox,oy for GPU upload
  let lastFrameTime    = 0;
  let lastShakeTime    = 0;

  function computeGrid(mode, aspect) {
    if (mode === 'square') {
      const total = 144;
      const cx = Math.max(1, Math.round(Math.sqrt(total * aspect)));
      const cy = Math.max(1, Math.round(Math.sqrt(total / aspect)));
      return { gx: cx, gy: cy };
    }
    return { gx: 12, gy: 12 };
  }

  // raw mouse in canvas-pixel space
  let rawMouseX = 0.5;
  let rawMouseY = 0.5;

  // smoothed mouse in [0,1] plane space (passed to shader)
  let smoothMouseX = 0.5;
  let smoothMouseY = 0.5;

  /* ------------------------------------------------------------------ */
  /*  WGSL shaders                                                        */
  /* ------------------------------------------------------------------ */
  function buildShaderCode(gx, gy) { return /* wgsl */ `
    // ---- Uniforms & bindings ----
    struct Uniforms {
      mouse       : vec2<f32>,
      time        : f32,
      hoverActive : f32,
    };

    @group(0) @binding(0) var<uniform>          uni         : Uniforms;
    @group(0) @binding(1) var                   samp        : sampler;
    @group(0) @binding(2) var                   tex         : texture_2d<f32>;
    @group(0) @binding(3) var<storage, read>    quadOffsets : array<vec2<f32>>;

    // ---- Vertex output ----
    struct VertOut {
      @builtin(position) pos         : vec4<f32>,
      @location(0)       quadUV      : vec2<f32>,   // [0..1] local position in quad
      @location(1)       sliceCenter : vec2<f32>,   // original image-UV center of this quad
      @location(2)       colRow      : vec2<f32>,   // col, row (for hash2 / wiggle)
      @location(3)       planeUV     : vec2<f32>,   // undisplaced plane UV (for hover math)
    };

    // ---- Vertex shader (instanced) ----
    @vertex
    fn vs_main(
      @builtin(vertex_index)   vi  : u32,
      @builtin(instance_index) idx : u32
    ) -> VertOut {
      let GRID_X = ${gx}.0;
      let GRID_Y = ${gy}.0;

      // Unit quad (two triangles), local [0..1] coords
      var localPos = array<vec2<f32>, 6>(
        vec2(0.0, 0.0),
        vec2(1.0, 0.0),
        vec2(0.0, 1.0),
        vec2(0.0, 1.0),
        vec2(1.0, 0.0),
        vec2(1.0, 1.0),
      );
      let lp  = localPos[vi];
      let col = f32(idx % ${gx}u);
      let row = f32(idx / ${gx}u);

      // Undisplaced plane UV for this vertex
      let planeUV  = vec2((col + lp.x) / GRID_X, (row + lp.y) / GRID_Y);
      // Convert to clip space (-1..+1), then add physics offset
      let clipBase = vec2(planeUV.x * 2.0 - 1.0, 1.0 - planeUV.y * 2.0);
      let phyOff   = quadOffsets[idx];

      var out : VertOut;
      out.pos         = vec4(clipBase + phyOff, 0.0, 1.0);
      out.quadUV      = lp;
      out.sliceCenter = vec2((col + 0.5) / GRID_X, (row + 0.5) / GRID_Y);
      out.colRow      = vec2(col, row);
      out.planeUV     = planeUV;
      return out;
    }

    // ---- Helpers ----
    fn hash2(p: vec2<f32>) -> vec2<f32> {
      let q = vec2<f32>(dot(p, vec2<f32>(127.1, 311.7)), dot(p, vec2<f32>(269.5, 183.3)));
      return fract(sin(q) * 43758.5453) * 6.2832;
    }

    // ---- Fragment shader ----
    @fragment
    fn fs_main(in : VertOut) -> @location(0) vec4<f32> {
      let GRID_X = ${gx}.0;
      let GRID_Y = ${gy}.0;

      // Grid cell and plane UV come from vertex varyings
      let col = in.colRow.x;
      let row = in.colRow.y;
      let uv  = in.planeUV;   // undisplaced — drives imageUV exactly as before

      // The four corners of this quad in undisplaced plane-UV space (for hover distance)
      let qx0 = col         / GRID_X;
      let qx1 = (col + 1.0) / GRID_X;
      let qy0 = row         / GRID_Y;
      let qy1 = (row + 1.0) / GRID_Y;

      let mouse = uni.mouse;

      let c0 = vec2(qx0, qy0);
      let c1 = vec2(qx1, qy0);
      let c2 = vec2(qx0, qy1);
      let c3 = vec2(qx1, qy1);

      let d0 = distance(mouse, c0);
      let d1 = distance(mouse, c1);
      let d2 = distance(mouse, c2);
      let d3 = distance(mouse, c3);

      var minDist = d0;
      var nearestCorner = c0;
      if (d1 < minDist) { minDist = d1; nearestCorner = c1; }
      if (d2 < minDist) { minDist = d2; nearestCorner = c2; }
      if (d3 < minDist) { minDist = d3; nearestCorner = c3; }

      let t  = clamp(minDist / 0.455, 0.0, 1.0);
      let ts = smoothstep(0.0, 1.0, t);

      let offsetDir = select(
        normalize(mouse - nearestCorner),
        vec2(0.0),
        minDist < 0.001
      );
      let offsetMag = 0.03 * ts * uni.hoverActive;
      let offset = offsetDir * offsetMag;

      let hoverZoom  = mix(0.25, 1.0, ts);
      let zoomFactor = mix(1.0, hoverZoom, uni.hoverActive);
      let sliceCenter = in.sliceCenter;

      let phase = hash2(vec2(col, row));
      let wiggleT = smoothstep(0.0, 2.0 / GRID_X, minDist);
      let wiggle = vec2<f32>(
        sin(uni.time * 0.9 + phase.x) * 0.022 * wiggleT,
        cos(uni.time * 0.7 + phase.y) * 0.022 * wiggleT
      );

      let imageUV = clamp(
        sliceCenter + (uv - sliceCenter) / zoomFactor + offset + wiggle,
        vec2(0.0), vec2(1.0)
      );

      let color = textureSample(tex, samp, imageUV);
      return vec4(color.rgb, 1.0);
    }
  `; }

  /* ------------------------------------------------------------------ */
  /*  Pipeline, buffers, bind group (created once image is loaded)       */
  /* ------------------------------------------------------------------ */
  let pipeline       = null;
  let uniformBuffer  = null;
  let bindGroup      = null;
  let texture        = null;

  device.addEventListener('uncapturederror', (e) => {
    console.error('WebGPU uncaptured error:', e.error);
    fatalError('WebGPU error: ' + e.error.message);
  });

  async function createPipeline(gpuTexture) {
    texture = gpuTexture;

    const shaderModule = device.createShaderModule({ code: buildShaderCode(gridX, gridY) });

    // Check for shader compilation errors
    const info = await shaderModule.getCompilationInfo();
    for (const msg of info.messages) {
      if (msg.type === 'error') {
        fatalError('Shader error (line ' + msg.lineNum + '): ' + msg.message);
        console.error('Shader compile error:', msg);
        return;
      }
    }

    pipeline = device.createRenderPipeline({
      layout: 'auto',
      vertex:   { module: shaderModule, entryPoint: 'vs_main' },
      fragment: {
        module: shaderModule,
        entryPoint: 'fs_main',
        targets: [{ format: preferredFormat }],
      },
      primitive: { topology: 'triangle-list' },
    });

    // Uniform buffer: mouse(vec2) + time + hoverActive = 16 bytes
    uniformBuffer = device.createBuffer({
      size: 16,
      usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST,
    });

    // Storage buffer: per-quad physics offsets (vec2 each)
    const qCount = gridX * gridY;
    quadCount = qCount;
    quadOffsetBuffer = device.createBuffer({
      size:  qCount * 8,
      usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST,
    });
    initPhysics(qCount);

    const sampler = device.createSampler({
      magFilter: 'linear',
      minFilter: 'linear',
      addressModeU: 'clamp-to-edge',
      addressModeV: 'clamp-to-edge',
    });

    bindGroup = device.createBindGroup({
      layout: pipeline.getBindGroupLayout(0),
      entries: [
        { binding: 0, resource: { buffer: uniformBuffer } },
        { binding: 1, resource: sampler },
        { binding: 2, resource: texture.createView() },
        { binding: 3, resource: { buffer: quadOffsetBuffer } },
      ],
    });
  }

  /* ------------------------------------------------------------------ */
  /*  Physics simulation                                                  */
  /* ------------------------------------------------------------------ */
  const DAMPING = 0.88;
  const IMPULSE = 0.09;
  const PHY_MAX = 2.2;  // clip-space units; beyond this quad is off-screen

  function initPhysics(count) {
    physicsState = new Float32Array(count * 4);  // all zeros = home
    offsetData   = new Float32Array(count * 2);
  }

  function updatePhysics(dt) {
    if (!physicsState) return;
    const dtCapped = Math.min(dt, 0.05);
    for (let i = 0; i < quadCount; i++) {
      const b = i * 4;
      let ox = physicsState[b],     oy = physicsState[b + 1];
      let vx = physicsState[b + 2], vy = physicsState[b + 3];

      // Spring-return: mouse proximity pulls scattered quads back toward home
      if (hoverActive > 0.01) {
        const col = i % gridX;
        const row = Math.floor(i / gridX);
        const cx  = (col + 0.5) / gridX;
        const cy  = (row + 0.5) / gridY;
        const dx  = smoothMouseX - cx;
        const dy  = smoothMouseY - cy;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const proximity = Math.max(0, 1 - dist / 0.35);
        const spring = proximity * hoverActive * 0.06;
        vx -= ox * spring;
        vy -= oy * spring;
      }

      // Integrate + damp
      ox += vx * dtCapped * 60;
      oy += vy * dtCapped * 60;
      vx *= DAMPING;
      vy *= DAMPING;

      // Settle at edges — stop, don't bounce
      if (ox >  PHY_MAX) { ox =  PHY_MAX; vx = 0; }
      if (ox < -PHY_MAX) { ox = -PHY_MAX; vx = 0; }
      if (oy >  PHY_MAX) { oy =  PHY_MAX; vy = 0; }
      if (oy < -PHY_MAX) { oy = -PHY_MAX; vy = 0; }

      physicsState[b]     = ox;  physicsState[b + 1] = oy;
      physicsState[b + 2] = vx;  physicsState[b + 3] = vy;
      offsetData[i * 2]     = ox;
      offsetData[i * 2 + 1] = oy;
    }
    device.queue.writeBuffer(quadOffsetBuffer, 0, offsetData);
  }

  function applyShakeImpulse() {
    if (!physicsState) return;
    for (let i = 0; i < quadCount; i++) {
      const col = i % gridX;
      const row = Math.floor(i / gridX);
      // Quad center in clip space
      const cx  = ((col + 0.5) / gridX) * 2 - 1;
      const cy  = 1 - ((row + 0.5) / gridY) * 2;
      const len = Math.sqrt(cx * cx + cy * cy) || 1;
      const mag  = IMPULSE + Math.random() * 0.04;
      const perp = (Math.random() - 0.5) * 0.04;
      physicsState[i * 4 + 2] += (cx / len) * mag + (-cy / len) * perp;  // vx
      physicsState[i * 4 + 3] += (cy / len) * mag + ( cx / len) * perp;  // vy
    }
  }

  /* ------------------------------------------------------------------ */
  /*  Canvas sizing                                                       */
  /* ------------------------------------------------------------------ */
  function resizeCanvas() {
    if (!running) return;
    const padding  = 40;
    const maxW     = window.innerWidth  - padding * 2;
    const maxH     = window.innerHeight - padding * 2;

    let w, h;
    if (maxW / imageAspect <= maxH) {
      w = maxW;
      h = Math.round(maxW / imageAspect);
    } else {
      h = maxH;
      w = Math.round(maxH * imageAspect);
    }

    canvas.width  = w;
    canvas.height = h;
    canvas.style.width  = w + 'px';
    canvas.style.height = h + 'px';
    needsReconfigure = true;
  }

  window.addEventListener('resize', resizeCanvas);

  /* ------------------------------------------------------------------ */
  /*  Mouse tracking (desktop)                                           */
  /* ------------------------------------------------------------------ */
  canvas.addEventListener('mousemove', (e) => {
    if (!running) return;
    const rect = canvas.getBoundingClientRect();
    rawMouseX = (e.clientX - rect.left) / rect.width;
    rawMouseY = (e.clientY - rect.top)  / rect.height;
  });
  canvas.addEventListener('mouseleave', () => {
    rawMouseX = -2; rawMouseY = -2;
  });

  /* ------------------------------------------------------------------ */
  /*  Touch fallback (mobile without gyroscope)                          */
  /* ------------------------------------------------------------------ */
  let gyroActive = false;
  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  function handleTouch(e) {
    if (!running || gyroActive) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (!touch) return;
    const rect = canvas.getBoundingClientRect();
    rawMouseX = (touch.clientX - rect.left) / rect.width;
    rawMouseY = (touch.clientY - rect.top)  / rect.height;
  }
  canvas.addEventListener('touchstart', handleTouch, { passive: false });
  canvas.addEventListener('touchmove',  handleTouch, { passive: false });
  canvas.addEventListener('touchend', () => {
    if (!gyroActive) { rawMouseX = -2; rawMouseY = -2; }
  }, { passive: true });

  /* ------------------------------------------------------------------ */
  /*  Gyroscope (mobile)                                                 */
  /* ------------------------------------------------------------------ */
  function startGyroscope() {
    gyroActive = true;
    document.getElementById('gyro-btn').classList.add('enabled');
    document.getElementById('gyro-btn').textContent = 'Gyroscope On';

    window.addEventListener('deviceorientation', (e) => {
      if (!running) return;
      const gamma = e.gamma ?? 0;  // left/right tilt: -90 to 90
      const beta  = e.beta  ?? 0;  // fwd/back tilt:   -180 to 180
      rawMouseX = Math.max(0, Math.min(1, (gamma + 45) / 90));
      rawMouseY = Math.max(0, Math.min(1, (beta  - 30) / 90));
    });

    // Shake detection via accelerometer
    window.addEventListener('devicemotion', (e) => {
      if (!running) return;
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const mag = Math.sqrt((a.x ?? 0) ** 2 + (a.y ?? 0) ** 2 + (a.z ?? 0) ** 2);
      const now = performance.now();
      if (mag > 20 && now - lastShakeTime > 500) {
        lastShakeTime = now;
        applyShakeImpulse();
      }
    });
  }

  const gyroBtn = document.getElementById('gyro-btn');

  if (isMobile && window.DeviceOrientationEvent) {
    // Show button after upload (handled below); wire up click
    gyroBtn.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        // iOS 13+
        DeviceOrientationEvent.requestPermission()
          .then(state => { if (state === 'granted') startGyroscope(); })
          .catch(console.error);
      } else {
        // Android / older iOS
        startGyroscope();
      }
    });
  }

  /* ------------------------------------------------------------------ */
  /*  Render loop                                                         */
  /* ------------------------------------------------------------------ */
  const MOUSE_LERP = 0.08;

  function frame(now = 0) {
    if (!running) return;
    requestAnimationFrame(frame);

    const dt = lastFrameTime ? (now - lastFrameTime) / 1000 : 0;
    lastFrameTime = now;

    if (needsReconfigure) {
      configureContext();
      needsReconfigure = false;
    }

    // Smooth mouse
    smoothMouseX += (rawMouseX - smoothMouseX) * MOUSE_LERP;
    smoothMouseY += (rawMouseY - smoothMouseY) * MOUSE_LERP;

    // Lerp hoverActive: fast in (0.06), slow out (0.025) for lingering return to idle
    const isHovering = rawMouseX >= 0 && rawMouseX <= 1 && rawMouseY >= 0 && rawMouseY <= 1;
    hoverActive += ((isHovering ? 1.0 : 0.0) - hoverActive) * (isHovering ? 0.06 : 0.025);

    // Physics update + GPU offset buffer upload
    updatePhysics(dt);

    // Write uniforms
    const data = new Float32Array([smoothMouseX, smoothMouseY, now / 1000.0, hoverActive]);
    device.queue.writeBuffer(uniformBuffer, 0, data);

    const commandEncoder = device.createCommandEncoder();
    const renderPass     = commandEncoder.beginRenderPass({
      colorAttachments: [{
        view:       ctx.getCurrentTexture().createView(),
        clearValue: { r: 0.04, g: 0.04, b: 0.06, a: 1 },
        loadOp:     'clear',
        storeOp:    'store',
      }],
    });

    renderPass.setPipeline(pipeline);
    renderPass.setBindGroup(0, bindGroup);
    renderPass.draw(6, quadCount, 0, 0);  // 6 verts × 144 instances
    renderPass.end();

    device.queue.submit([commandEncoder.finish()]);
  }

  /* ------------------------------------------------------------------ */
  /*  Image upload                                                        */
  /* ------------------------------------------------------------------ */
  fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const bitmap = await createImageBitmap(file);
    imageAspect = bitmap.width / bitmap.height;

    // Create GPU texture from bitmap
    const gpuTex = device.createTexture({
      size:   [bitmap.width, bitmap.height, 1],
      format: 'rgba8unorm',
      usage:  GPUTextureUsage.TEXTURE_BINDING |
              GPUTextureUsage.COPY_DST         |
              GPUTextureUsage.RENDER_ATTACHMENT,
    });

    device.queue.copyExternalImageToTexture(
      { source: bitmap },
      { texture: gpuTex },
      [bitmap.width, bitmap.height],
    );
    bitmap.close();

    currentGpuTex = gpuTex;
    const g = computeGrid(gridMode, imageAspect);
    gridX = g.gx; gridY = g.gy;

    await createPipeline(currentGpuTex);
    if (!pipeline) return;

    running = true;
    resizeCanvas();
    document.getElementById('grid-toggle').classList.add('visible');
    if (isMobile && window.DeviceOrientationEvent) {
      gyroBtn.classList.add('visible');
    }

    // Hide upload screen
    uploadScreen.classList.add('hidden');

    // Center mouse start to avoid jarring first frame
    rawMouseX = 0.5;
    rawMouseY = 0.5;
    smoothMouseX = 0.5;
    smoothMouseY = 0.5;

    frame();
  });

  /* ------------------------------------------------------------------ */
  /*  Grid mode toggle                                                    */
  /* ------------------------------------------------------------------ */
  document.getElementById('grid-toggle').addEventListener('click', async (e) => {
    const btn = e.target.closest('.grid-btn');
    if (!btn || !currentGpuTex || btn.classList.contains('active')) return;

    gridMode = btn.dataset.mode;
    document.querySelectorAll('.grid-btn').forEach(b => b.classList.toggle('active', b === btn));

    const g = computeGrid(gridMode, imageAspect);
    gridX = g.gx; gridY = g.gy;

    await createPipeline(currentGpuTex);
  });

})();
</script>
</body>
</html>
