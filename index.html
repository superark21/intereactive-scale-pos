<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Image Grid</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    #upload-screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 20px; z-index: 10;
      transition: opacity 0.4s ease;
    }
    #upload-screen.hidden { opacity: 0; pointer-events: none; }

    #upload-screen h1 {
      font-size: 1.4rem; font-weight: 400;
      letter-spacing: 0.08em; text-transform: uppercase; color: #888;
    }

    #upload-label {
      display: inline-flex; align-items: center; gap: 10px;
      padding: 14px 32px; border: 1px solid #333; border-radius: 4px;
      cursor: pointer; font-size: 0.95rem; letter-spacing: 0.04em;
      color: #ccc; background: #111;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }
    #upload-label:hover { border-color: #666; color: #fff; background: #1a1a1a; }
    #file-input { display: none; }

    #canvas-container {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    #grid-container {
      display: grid;
      overflow: hidden;
      background: #0a0a0f;
    }

    .quad {
      background-repeat: no-repeat;
      background-color: #0a0a0f;
      will-change: transform;
      transform-origin: center center;
    }

    #grid-toggle {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      display: none; gap: 0; z-index: 5;
      border: 1px solid #333; border-radius: 4px; overflow: hidden;
    }
    #grid-toggle.visible { display: flex; }

    .grid-btn {
      padding: 8px 20px; background: #111; color: #555;
      font-size: 0.75rem; letter-spacing: 0.05em;
      cursor: pointer; border: none;
      transition: background 0.2s, color 0.2s;
    }
    .grid-btn + .grid-btn { border-left: 1px solid #333; }
    .grid-btn.active { background: #1e1e1e; color: #ddd; }
    .grid-btn:hover:not(.active) { color: #999; }

    #gyro-btn {
      position: fixed; bottom: 68px; left: 50%;
      transform: translateX(-50%);
      display: none; padding: 8px 20px;
      border: 1px solid #333; border-radius: 4px;
      background: #111; color: #888;
      font-size: 0.75rem; letter-spacing: 0.05em;
      cursor: pointer; z-index: 5;
      transition: color 0.2s, border-color 0.2s;
    }
    #gyro-btn.visible { display: block; }
    #gyro-btn.enabled { color: #7af; border-color: #7af; }
  </style>
</head>
<body>

  <div id="upload-screen">
    <h1>Image Grid</h1>
    <label id="upload-label" for="file-input">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.5">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="17 8 12 3 7 8"/>
        <line x1="12" y1="3" x2="12" y2="15"/>
      </svg>
      Choose an image
    </label>
    <input type="file" id="file-input" accept="image/*" />
    <p style="font-size:0.75rem;color:#444;margin-top:4px;">Move the mouse after upload</p>
  </div>

  <div id="canvas-container">
    <div id="grid-container"></div>
  </div>

  <div id="grid-toggle">
    <button class="grid-btn active" data-mode="proportional">Proportional</button>
    <button class="grid-btn"        data-mode="square">Square</button>
  </div>
  <button id="gyro-btn">Enable Gyroscope</button>

<script>
(() => {
  /* ------------------------------------------------------------------ */
  /*  State                                                               */
  /* ------------------------------------------------------------------ */
  let imageURL      = null;
  let imageAspect   = 1;
  let gridX         = 12;
  let gridY         = 12;
  let gridMode      = 'proportional';
  let quads         = [];       // div elements
  let phases        = [];       // [{x, y}] per-quad wiggle phases
  let smoothZooms   = null;     // Float32Array — per-quad lerped zoom
  let physicsState  = null;     // Float32Array[count*4]: ox,oy,vx,vy (pixels)
  let containerW    = 0;
  let containerH    = 0;
  let hoverActive   = 0;
  let rawMouseX     = -2;
  let rawMouseY     = -2;
  let smoothMouseX  = 0.5;
  let smoothMouseY  = 0.5;
  let lastTime      = 0;
  let lastShakeTime = 0;
  let gyroActive    = false;
  let touching      = false;
  let running       = false;

  const MOUSE_LERP = 0.08;
  const WIGGLE_AMP = 0.018;   // fraction of containerW
  const DAMPING    = 0.88;
  const IMPULSE    = 0.08;    // fraction of containerW per shake
  const isMobile   = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);

  const gridEl       = document.getElementById('grid-container');
  const uploadScreen = document.getElementById('upload-screen');
  const fileInput    = document.getElementById('file-input');
  const gyroBtn      = document.getElementById('gyro-btn');

  /* ------------------------------------------------------------------ */
  /*  Math helpers                                                        */
  /* ------------------------------------------------------------------ */
  function smoothstep(e0, e1, x) {
    const t = Math.max(0, Math.min(1, (x - e0) / (e1 - e0)));
    return t * t * (3 - 2 * t);
  }

  function dist(x1, y1, x2, y2) {
    const dx = x1 - x2, dy = y1 - y2;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function computeGrid(mode, aspect) {
    if (mode === 'square') {
      const total = 144;
      const cx = Math.max(1, Math.round(Math.sqrt(total * aspect)));
      const cy = Math.max(1, Math.round(Math.sqrt(total / aspect)));
      return { gx: cx, gy: cy };
    }
    return { gx: 12, gy: 12 };
  }

  /* ------------------------------------------------------------------ */
  /*  Grid creation                                                       */
  /* ------------------------------------------------------------------ */
  function buildGrid() {
    gridEl.innerHTML = '';
    quads  = [];
    phases = [];

    gridEl.style.gridTemplateColumns = `repeat(${gridX}, 1fr)`;
    gridEl.style.gridTemplateRows    = `repeat(${gridY}, 1fr)`;

    const count = gridX * gridY;
    for (let i = 0; i < count; i++) {
      const el = document.createElement('div');
      el.className = 'quad';
      el.style.backgroundImage = `url(${imageURL})`;
      gridEl.appendChild(el);
      quads.push(el);
      phases.push({
        x: Math.random() * Math.PI * 2,
        y: Math.random() * Math.PI * 2,
      });
    }

    smoothZooms = new Float32Array(count).fill(1);
    initPhysics(count);
  }

  /* Background-size/position: show each quad's correct image slice.
     Uses the full container pixel dimensions so slices are pixel-exact. */
  function applySliceStyles() {
    const W = containerW, H = containerH;
    quads.forEach((el, i) => {
      const col = i % gridX;
      const row = Math.floor(i / gridX);
      el.style.backgroundSize = `${W}px ${H}px`;
      const bpx = gridX < 2 ? '0%' : `${col / (gridX - 1) * 100}%`;
      const bpy = gridY < 2 ? '0%' : `${row / (gridY - 1) * 100}%`;
      el.style.backgroundPosition = `${bpx} ${bpy}`;
    });
  }

  /* ------------------------------------------------------------------ */
  /*  Container sizing                                                    */
  /* ------------------------------------------------------------------ */
  function sizeContainer() {
    if (!running) return;
    const pad  = 40;
    const maxW = window.innerWidth  - pad * 2;
    const maxH = window.innerHeight - pad * 2;

    let w, h;
    if (maxW / imageAspect <= maxH) {
      w = maxW; h = Math.round(maxW / imageAspect);
    } else {
      h = maxH; w = Math.round(maxH * imageAspect);
    }

    containerW = w;
    containerH = h;
    gridEl.style.width  = w + 'px';
    gridEl.style.height = h + 'px';

    applySliceStyles();
  }

  window.addEventListener('resize', sizeContainer);

  /* ------------------------------------------------------------------ */
  /*  Physics                                                             */
  /* ------------------------------------------------------------------ */
  function initPhysics(count) {
    physicsState = new Float32Array(count * 4); // all zeros = home
  }

  function applyShakeImpulse() {
    if (!physicsState || !containerW) return;
    const W = containerW;
    for (let i = 0; i < quads.length; i++) {
      const col = i % gridX;
      const row = Math.floor(i / gridX);
      // Outward direction from centre in [-1,+1] clip space
      const cx  = ((col + 0.5) / gridX) * 2 - 1;
      const cy  = ((row + 0.5) / gridY) * 2 - 1;
      const len = Math.sqrt(cx * cx + cy * cy) || 1;
      const mag  = (IMPULSE + Math.random() * 0.04) * W;
      const perp = (Math.random() - 0.5) * 0.04 * W;
      physicsState[i * 4 + 2] += (cx / len) * mag + (-cy / len) * perp; // vx
      physicsState[i * 4 + 3] += (cy / len) * mag + ( cx / len) * perp; // vy
    }
  }

  function updatePhysics(dt) {
    if (!physicsState || !containerW) return;
    const dtCapped = Math.min(dt, 0.05);
    const W = containerW, H = containerH;
    const qW = W / gridX, qH = H / gridY;

    for (let i = 0; i < quads.length; i++) {
      const col = i % gridX;
      const row = Math.floor(i / gridX);
      const b = i * 4;
      let ox = physicsState[b],     oy = physicsState[b + 1];
      let vx = physicsState[b + 2], vy = physicsState[b + 3];

      // Spring-return: hover proximity pulls quad back to home (offset 0,0)
      if (hoverActive > 0.01) {
        const cx  = (col + 0.5) / gridX;
        const cy  = (row + 0.5) / gridY;
        const d   = dist(smoothMouseX, smoothMouseY, cx, cy);
        const prox = Math.max(0, 1 - d / 0.35);
        const spring = prox * hoverActive * 0.06;
        vx -= ox * spring;
        vy -= oy * spring;
      }

      // Integrate + damp
      ox += vx * dtCapped * 60;
      oy += vy * dtCapped * 60;
      vx *= DAMPING;
      vy *= DAMPING;

      // Settle at container edges (quad edge touches container edge)
      const origX = col * qW, origY = row * qH;
      const maxOx =  W - origX - qW,  minOx = -origX;
      const maxOy =  H - origY - qH,  minOy = -origY;
      if (ox > maxOx) { ox = maxOx; vx = 0; }
      if (ox < minOx) { ox = minOx; vx = 0; }
      if (oy > maxOy) { oy = maxOy; vy = 0; }
      if (oy < minOy) { oy = minOy; vy = 0; }

      physicsState[b]     = ox; physicsState[b + 1] = oy;
      physicsState[b + 2] = vx; physicsState[b + 3] = vy;
    }
  }

  /* ------------------------------------------------------------------ */
  /*  Render loop                                                         */
  /* ------------------------------------------------------------------ */
  function frame(now = 0) {
    if (!running) return;
    requestAnimationFrame(frame);

    const dt = lastTime ? (now - lastTime) / 1000 : 0;
    lastTime = now;

    // Smooth mouse
    smoothMouseX += (rawMouseX - smoothMouseX) * MOUSE_LERP;
    smoothMouseY += (rawMouseY - smoothMouseY) * MOUSE_LERP;

    // hoverActive: fast in, slow out
    const isHovering = rawMouseX >= 0 && rawMouseX <= 1
                    && rawMouseY >= 0 && rawMouseY <= 1;
    hoverActive += ((isHovering ? 1 : 0) - hoverActive)
                 * (isHovering ? 0.06 : 0.025);

    updatePhysics(dt);

    const time = now / 1000;
    const W    = containerW;

    for (let i = 0; i < quads.length; i++) {
      const col = i % gridX;
      const row = Math.floor(i / gridX);

      // Physics offset (pixels)
      const ox = physicsState[i * 4];
      const oy = physicsState[i * 4 + 1];

      // Min distance from smooth mouse to quad corners (in [0,1] UV space)
      const qx0 = col / gridX,       qx1 = (col + 1) / gridX;
      const qy0 = row / gridY,       qy1 = (row + 1) / gridY;
      const minDist = Math.min(
        dist(smoothMouseX, smoothMouseY, qx0, qy0),
        dist(smoothMouseX, smoothMouseY, qx1, qy0),
        dist(smoothMouseX, smoothMouseY, qx0, qy1),
        dist(smoothMouseX, smoothMouseY, qx1, qy1),
      );

      // Zoom: near cursor = 0.25x, far = 1.0x — lerped per quad to prevent stutter
      const t        = Math.min(1, minDist / 0.455);
      const ts       = smoothstep(0, 1, t);
      const hZoom    = 0.25 + 0.75 * ts;
      const target   = 1 + (hZoom - 1) * hoverActive;
      smoothZooms[i] += (target - smoothZooms[i]) * 0.12;
      const zoom     = smoothZooms[i];

      // Wiggle: per-quad independent, zero right at cursor
      const wiggleT  = smoothstep(0, 2 / gridX, minDist);
      const ph       = phases[i];
      const wx       = Math.sin(time * 0.9 + ph.x) * WIGGLE_AMP * W * wiggleT;
      const wy       = Math.cos(time * 0.7 + ph.y) * WIGGLE_AMP * W * wiggleT;

      // Apply: scale in place, then translate (scale applied first by CSS)
      quads[i].style.transform =
        `translate(${ox + wx}px, ${oy + wy}px) scale(${zoom})`;
    }
  }

  /* ------------------------------------------------------------------ */
  /*  Mouse (desktop)                                                     */
  /* ------------------------------------------------------------------ */
  gridEl.addEventListener('mousemove', (e) => {
    if (!running) return;
    const r = gridEl.getBoundingClientRect();
    rawMouseX = (e.clientX - r.left)  / r.width;
    rawMouseY = (e.clientY - r.top)   / r.height;
  });
  gridEl.addEventListener('mouseleave', () => { rawMouseX = -2; rawMouseY = -2; });

  /* ------------------------------------------------------------------ */
  /*  Touch (mobile fallback + recover-while-gyro-on)                    */
  /* ------------------------------------------------------------------ */
  function handleTouch(e) {
    if (!running) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (!touch) return;
    touching = true;
    const r = gridEl.getBoundingClientRect();
    rawMouseX = (touch.clientX - r.left) / r.width;
    rawMouseY = (touch.clientY - r.top)  / r.height;
  }
  gridEl.addEventListener('touchstart', handleTouch, { passive: false });
  gridEl.addEventListener('touchmove',  handleTouch, { passive: false });
  gridEl.addEventListener('touchend',   () => {
    touching = false;
    rawMouseX = -2; rawMouseY = -2;
  }, { passive: true });

  /* ------------------------------------------------------------------ */
  /*  Gyroscope + shake                                                   */
  /* ------------------------------------------------------------------ */
  function startGyroscope() {
    gyroActive = true;
    gyroBtn.classList.add('enabled');
    gyroBtn.textContent = 'Gyroscope On';

    window.addEventListener('deviceorientation', (e) => {
      if (!running || touching) return;
      const gamma = e.gamma ?? 0;
      const beta  = e.beta  ?? 0;
      rawMouseX = Math.max(0, Math.min(1, (gamma + 45) / 90));
      rawMouseY = Math.max(0, Math.min(1, (beta  - 30) / 90));
    });

    window.addEventListener('devicemotion', (e) => {
      if (!running) return;
      const a = e.accelerationIncludingGravity;
      if (!a) return;
      const mag = Math.sqrt((a.x ?? 0) ** 2 + (a.y ?? 0) ** 2 + (a.z ?? 0) ** 2);
      const nowMs = performance.now();
      if (mag > 20 && nowMs - lastShakeTime > 500) {
        lastShakeTime = nowMs;
        applyShakeImpulse();
      }
    });
  }

  if (isMobile && window.DeviceOrientationEvent) {
    gyroBtn.addEventListener('click', () => {
      if (typeof DeviceOrientationEvent.requestPermission === 'function') {
        DeviceOrientationEvent.requestPermission()
          .then(state => { if (state === 'granted') startGyroscope(); })
          .catch(console.error);
      } else {
        startGyroscope();
      }
    });
  }

  /* ------------------------------------------------------------------ */
  /*  Image upload                                                        */
  /* ------------------------------------------------------------------ */
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    img.onload = () => {
      imageAspect = img.naturalWidth / img.naturalHeight;
      imageURL    = URL.createObjectURL(file);

      const g = computeGrid(gridMode, imageAspect);
      gridX = g.gx; gridY = g.gy;

      running = true;
      buildGrid();
      sizeContainer();

      uploadScreen.classList.add('hidden');
      document.getElementById('grid-toggle').classList.add('visible');
      if (isMobile && window.DeviceOrientationEvent) gyroBtn.classList.add('visible');

      rawMouseX = 0.5; rawMouseY = 0.5;
      smoothMouseX = 0.5; smoothMouseY = 0.5;

      requestAnimationFrame(frame);
    };
    img.src = URL.createObjectURL(file);
  });

  /* ------------------------------------------------------------------ */
  /*  Grid mode toggle                                                    */
  /* ------------------------------------------------------------------ */
  document.getElementById('grid-toggle').addEventListener('click', (e) => {
    const btn = e.target.closest('.grid-btn');
    if (!btn || !imageURL || btn.classList.contains('active')) return;

    gridMode = btn.dataset.mode;
    document.querySelectorAll('.grid-btn')
      .forEach(b => b.classList.toggle('active', b === btn));

    const g = computeGrid(gridMode, imageAspect);
    gridX = g.gx; gridY = g.gy;

    buildGrid();
    sizeContainer();
  });

})();
</script>
</body>
</html>
